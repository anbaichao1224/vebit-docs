name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Docker
        run: |
          docker build --progress=plain -t vebit-docs .
          echo "Starting Middleman build..."
          docker run --rm \
            -v ${{ github.workspace }}:/srv/slate \
            -v ${{ github.workspace }}/build:/srv/slate/build \
            vebit-docs bash -c "set -x && bundle exec middleman build --clean --verbose 2>&1"
          # Fix permissions
          sudo chown -R $(id -u):$(id -g) build/

      - name: Check build output
        run: |
          echo "Build contents:"
          find build/ -name "*.html" | sort
          echo "Total HTML files: $(find build/ -name "*.html" | wc -l)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
