name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install dependencies
        run: |
          rm -f Gemfile.lock
          bundle install
        timeout-minutes: 5

      - name: Build
        run: |
          bundle exec middleman build --clean --verbose 2>&1 | tee build-output.txt
        timeout-minutes: 10

      - name: Show verbose errors
        if: failure()
        run: |
          echo "=== Build output ==="
          cat build-output.txt

      - name: Check build output
        run: |
          echo "Build contents:"
          find build/ -name "*.html" | sort
          echo "Total HTML files: $(find build/ -name "*.html" | wc -l)"
          echo "---"
          find build/ | sort | head -50

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
