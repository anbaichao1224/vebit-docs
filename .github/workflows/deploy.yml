name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install dependencies
        run: |
          rm -f Gemfile.lock
          bundle config unset deployment
          bundle install
        timeout-minutes: 5

      - name: Build
        run: |
          bundle exec middleman build --clean --verbose 2>&1 > build-output.txt
          exit_code=${PIPESTATUS[0]}
          echo "Build exit code: $exit_code"
          echo "=== FULL BUILD OUTPUT ==="
          cat build-output.txt
          echo "=== Build contents ==="
          find build/ -type f 2>/dev/null | sort | head -60
          echo "Total HTML files: $(find build/ -name '*.html' 2>/dev/null | wc -l)"
          if [ $exit_code -ne 0 ]; then
            exit 1
          fi
        timeout-minutes: 10

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
